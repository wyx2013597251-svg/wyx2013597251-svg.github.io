<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>妍妍妈妈永远爱你 ❤️‍🔥</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:
    radial-gradient(circle at top,#ff7aa2 0%,#ff4d88 25%,#160014 100%);
    font-family:
    "PingFang SC",
    "Microsoft YaHei",
    sans-serif;
    position:relative;
}

/* 星空 */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:0.2;
        transform:scale(1);
    }
    to{
        opacity:1;
        transform:scale(1.8);
    }
}

/* 爱心漂浮 */
.heart{
    position:absolute;
    bottom:-50px;
    color:rgba(255,255,255,0.7);
    animation:float linear forwards;
    pointer-events:none;
}

@keyframes float{
    0%{
        transform:
        translateY(0)
        scale(0.5)
        rotate(0deg);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translateY(-120vh)
        translateX(100px)
        scale(1.6)
        rotate(360deg);

        opacity:0;
    }
}

/* 中心区域 */
.center{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:5;
}

/* 主卡片 */
.card{
    position:relative;
    width:90%;
    max-width:900px;
    padding:80px 50px;
    border-radius:40px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,0.18),
        rgba(255,255,255,0.05)
    );

    border:1px solid rgba(255,255,255,0.25);

    backdrop-filter:blur(25px);

    box-shadow:
    0 0 50px rgba(255,77,136,0.4),
    0 0 120px rgba(255,0,100,0.25);

    overflow:hidden;

    animation:fadeUp 1.6s ease;
}

/* 发光边框 */
.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:40px;
    padding:2px;

    background:
    linear-gradient(
        45deg,
        #fff,
        #ff8fab,
        #ff4d88,
        #fff
    );

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);

    -webkit-mask-composite:xor;
    mask-composite:exclude;

    animation:borderMove 6s linear infinite;
}

@keyframes borderMove{
    0%{
        filter:hue-rotate(0deg);
    }
    100%{
        filter:hue-rotate(360deg);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:
        translateY(60px)
        scale(0.9);
    }
    to{
        opacity:1;
        transform:
        translateY(0)
        scale(1);
    }
}

/* 标题 */
.title{
    text-align:center;
    color:white;
    font-size:68px;
    line-height:1.4;
    font-weight:800;

    text-shadow:
    0 0 10px rgba(255,255,255,0.8),
    0 0 30px rgba(255,120,170,0.8),
    0 0 60px rgba(255,0,120,0.5);

    animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.03);
    }
}

/* 副标题 */
.desc{
    margin-top:30px;
    text-align:center;
    color:rgba(255,255,255,0.9);
    font-size:24px;
    letter-spacing:3px;
}

/* 底部光 */
.light{
    position:absolute;
    width:700px;
    height:700px;
    background:
    radial-gradient(
        circle,
        rgba(255,255,255,0.2),
        transparent 70%
    );

    border-radius:50%;
    filter:blur(40px);

    animation:pulse 5s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(0.9);
        opacity:0.5;
    }
    50%{
        transform:scale(1.1);
        opacity:1;
    }
    100%{
        transform:scale(0.9);
        opacity:0.5;
    }
}

/* 手机适配 */
@media(max-width:768px){

.title{
    font-size:40px;
}

.desc{
    font-size:18px;
}

.card{
    padding:60px 25px;
}

}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="center">
    <div class="light"></div>

    <div class="card">

        <div class="title">
            妍妍妈妈<br>
            永远爱你 ❤️‍🔥
        </div>

        <div class="desc">
            “爱意不会消失，只会越来越深。”
        </div>

    </div>
</div>

<script>

/* 星空生成 */
const stars=document.getElementById("stars");

for(let i=0;i<180;i++){

    const star=document.createElement("div");
    star.classList.add("star");

    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";

    star.style.animationDuration=
    Math.random()*3+2+"s";

    star.style.opacity=Math.random();

    stars.appendChild(star);
}

/* 漂浮爱心 */
function createHeart(){

    const heart=document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML=[
        "❤","💖","💘","💕","💗"
    ][Math.floor(Math.random()*5)];

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=
    Math.random()*25+18+"px";

    heart.style.animationDuration=
    Math.random()*6+5+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },12000);
}

setInterval(createHeart,220);

</script>

</body>
</html>
